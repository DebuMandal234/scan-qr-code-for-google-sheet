<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>QR Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  margin:0;
  padding:20px;
  background:#0f172a;
  font-family:Arial;
  color:white;
  text-align:center;
}

.container{
  max-width:450px;
  margin:auto;
  background:#1e293b;
  padding:20px;
  border-radius:20px;
}

h1{
  color:#38bdf8;
}

#reader{
  width:100%;
  border-radius:15px;
  overflow:hidden;
  margin-top:15px;
}

button{
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:black;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

input,
select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  font-size:14px;
  box-sizing:border-box;
}

#status{
  margin-top:15px;
  padding:12px;
  border-radius:10px;
  background:#334155;
  word-break:break-word;
}

.success{
  background:#16a34a !important;
}

.error{
  background:#dc2626 !important;
}

.hidden{
  display:none;
}

.setting-box{
  margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<h1>QR Scanner</h1>

<!-- SETUP PAGE -->

<div id="setupPage">

  <p>
    Enter Google Apps Script Web App URL
  </p>

  <input
    type="text"
    id="webAppUrl"
    placeholder="Paste deployed web app URL"
  />

  <button onclick="saveWebAppUrl()">
    Save & Start Scanner
  </button>

</div>

<!-- SCANNER PAGE -->

<div id="scannerPage" class="hidden">

  <!-- DUPLICATE OPTION -->

  <div class="setting-box">

    <label>
      Duplicate Scan Allowed?
    </label>

    <select id="duplicateMode">

      <option value="yes">
        Yes
      </option>

      <option value="no">
        No
      </option>

    </select>

  </div>

  <!-- QR READER -->

  <div id="reader"></div>

  <!-- BUTTONS -->

  <button onclick="switchCamera()">
    Switch Camera
  </button>

  <button onclick="changeUrl()">
    Change Web App URL
  </button>

</div>

<!-- STATUS -->

<div id="status">
Ready
</div>

</div>

<script>

let html5QrCode;

let cameras = [];

let currentCamera = 0;

let lastText = "";

let lastTime = 0;

// STORAGE KEY

const STORAGE_KEY =
  "google_webapp_url";

// DUPLICATE TRACKER

const scannedItems =
  new Set();

// BEEP SOUND

const beepSound =
  new Audio(
    "https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
  );

// STATUS FUNCTION

function showStatus(
  msg,
  isError=false
){

  const status =
    document.getElementById(
      "status"
    );

  status.innerText = msg;

  status.className = "";

  if(isError){

    status.classList.add(
      "error"
    );

  }else{

    status.classList.add(
      "success"
    );

  }

}

// SAVE URL

function saveWebAppUrl(){

  const url =
    document
      .getElementById(
        "webAppUrl"
      )
      .value
      .trim();

  if(!url){

    showStatus(
      "Please enter URL",
      true
    );

    return;
  }

  localStorage.setItem(
    STORAGE_KEY,
    url
  );

  startApp();

}

// CHANGE URL

function changeUrl(){

  localStorage.removeItem(
    STORAGE_KEY
  );

  location.reload();

}

// START APP

async function startApp(){

  document
    .getElementById(
      "setupPage"
    )
    .classList.add(
      "hidden"
    );

  document
    .getElementById(
      "scannerPage"
    )
    .classList.remove(
      "hidden"
    );

  await initScanner();

}

// INIT SCANNER

async function initScanner(){

  try{

    cameras =
      await Html5Qrcode
        .getCameras();

    if(
      cameras.length === 0
    ){

      showStatus(
        "No camera found",
        true
      );

      return;
    }

    let backCam =
      cameras.find(cam =>
        cam.label
        .toLowerCase()
        .includes("back")
      );

    if(backCam){

      currentCamera =
        cameras.indexOf(
          backCam
        );

    }

    startScanner(
      cameras[currentCamera].id
    );

  }catch(err){

    showStatus(
      err.message,
      true
    );

  }

}

// START CAMERA

async function startScanner(
  cameraId
){

  if(html5QrCode){

    try{

      await html5QrCode.stop();

    }catch(e){}

  }

  html5QrCode =
    new Html5Qrcode(
      "reader"
    );

  html5QrCode.start(

    cameraId,

    {

      fps:10,

      qrbox:{
        width:250,
        height:250
      },

      rememberLastUsedCamera:true

    },

    onScanSuccess

  );

}

// SWITCH CAMERA

async function switchCamera(){

  if(
    cameras.length <= 1
  ){

    showStatus(
      "Only one camera",
      true
    );

    return;

  }

  currentCamera =
    (currentCamera + 1)
    % cameras.length;

  startScanner(
    cameras[currentCamera].id
  );

}

// ON SCAN SUCCESS

function onScanSuccess(
  decodedText
){

  const now =
    Date.now();

  // PREVENT RAPID SAME SCAN

  if(

    decodedText === lastText &&

    now - lastTime < 1500

  ){

    return;

  }

  lastText = decodedText;

  lastTime = now;

  // CHECK DUPLICATE MODE

  const duplicateMode =

    document
      .getElementById(
        "duplicateMode"
      )
      .value;

  // BLOCK DUPLICATE

  if(

    duplicateMode === "no" &&

    scannedItems.has(
      decodedText
    )

  ){

    showStatus(

      "Duplicate Blocked: " +
      decodedText,

      true

    );

    return;

  }

  // SAVE TO MEMORY

  scannedItems.add(
    decodedText
  );

  // PLAY SOUND

  beepSound.play();

  // SEND DATA

  sendToGoogleSheet(
    decodedText
  );

}

// SEND DATA

async function sendToGoogleSheet(
  qrData
){

  const webAppUrl =

    localStorage.getItem(
      STORAGE_KEY
    );

  try{

    const formData =
      new FormData();

    formData.append(
      "qrData",
      qrData
    );

    formData.append(

      "timestamp",

      new Date()
      .toISOString()

    );

    const response =

      await fetch(

        webAppUrl,

        {

          method:"POST",

          body:formData

        }

      );

    const result =
      await response.json();

    if(result.success){

      showStatus(
        "Saved: " + qrData
      );

    }else{

      showStatus(

        result.message ||
        "Failed",

        true

      );

    }

  }catch(err){

    showStatus(
      err.message,
      true
    );

  }

}

// PAGE LOAD

window.onload = function(){

  const savedUrl =

    localStorage.getItem(
      STORAGE_KEY
    );

  if(savedUrl){

    startApp();

  }else{

    document
      .getElementById(
        "setupPage"
      )
      .classList.remove(
        "hidden"
      );

  }

};

</script>

</body>
</html>
